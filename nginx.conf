server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion GZIP
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml font/woff2;
    gzip_disable "MSIE [1-6]\.";

    # Cache de assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Prevencion de error 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Denegar acceso a archivos ocultos (ej. .git)
    location ~ /\. {
        deny all;
    }
}